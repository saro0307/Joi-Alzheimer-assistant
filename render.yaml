services:
  - type: web
    name: joi-memory-bot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python Joi.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 10000
    disk:
      name: memories-storage
      mountPath: /data
      sizeGB: 1
      
